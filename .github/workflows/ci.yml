name: CI

on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync
        run: uv sync

      - name: Tests
        run: uv run python -m pytest tests -v

      - name: Ruff
        run: uvx ruff check

      - name: Build package
        run: uv build

      - name: Upload wheel
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/*.whl

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: wheel
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          generate_release_notes: true

  windows-executable:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build standalone executable
        shell: pwsh
        run: |
          python -m pip install --upgrade pip pyinstaller .
          pyinstaller --noconfirm --clean --onefile --console --name opencodex --paths src --collect-all textual --hidden-import opencodex_proxy.app --hidden-import opencodex_proxy.protocol --hidden-import opencodex_proxy.tui opencodex.py

      - name: Attach executable to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/opencodex.exe
